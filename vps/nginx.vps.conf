# ═══════════════════════════════════════════════════════════════════════════
# EduPlexo VPS — Nginx Configuration
# ═══════════════════════════════════════════════════════════════════════════
# API-only reverse proxy. Frontends are deployed on Vercel.
#
# Routes:
#   api.eduplexo.com/api/*   → backend-go:8080
#   api.eduplexo.com/chat/*  → edubot:8001
#   api.eduplexo.com/ws      → backend-go:8080 (WebSocket)
#   api.eduplexo.com/health  → backend-go:8080

worker_processes auto;
worker_rlimit_nofile 8192;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=10s;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ──────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 500;
    types_hash_max_size 2048;
    server_tokens off;

    # Upload limit (10MB for payment screenshots etc)
    client_max_body_size 10m;

    # ─── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        text/event-stream;

    # ─── Rate Limiting ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── Upstream: Go Backend ─────────────────────────────────────────────
    upstream backend {
        server backend-go:8080;
        keepalive 16;
        keepalive_requests 500;
        keepalive_timeout 60s;
    }

    # ─── Upstream: Plexa Chatbot ──────────────────────────────────────────
    upstream chatbot {
        server edubot:8001;
        keepalive 8;
    }

    # ─── HTTP → HTTPS Redirect + ACME Challenge ──────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Nginx health (Docker healthcheck)
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS API Server ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.eduplexo.com;

        # ─── TLS ─────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/api.eduplexo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.eduplexo.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;

        # ─── Security Headers ────────────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Connection limit per IP
        limit_conn conn_limit 20;

        # ─── API Routes ──────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_buffering off;

            # CORS preflight (safety net — Go backend handles CORS too)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Academic-Year-Id, X-Request-ID' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }
        }

        # ─── Auth (stricter rate limit) ──────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # ─── Plexa Chatbot (SSE streaming) ───────────────────────────────
        location /chat/ {
            limit_req zone=chat_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://chatbot;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            # SSE streaming — no buffering
            proxy_buffering off;

        # ─── Public Chatbot (landing page, no auth) ──────────────────────
        location /public-chat/ {
            limit_req zone=chat_limit burst=5 nodelay;
            limit_req_status 429;

            # CORS for landing page
            add_header Access-Control-Allow-Origin "https://www.eduplexo.com" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://chatbot;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 30s;
        }
            proxy_cache off;
            chunked_transfer_encoding on;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ─── WebSocket ───────────────────────────────────────────────────
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ─── Health (public) ─────────────────────────────────────────────
        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ─── Metrics (internal only) ─────────────────────────────────────
        location /metrics {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ─── Block everything else ───────────────────────────────────────
        location / {
            return 404 '{"error":"Not Found","message":"Use /api/ or /chat/ endpoints"}';
            add_header Content-Type application/json;
        }
    }
}
