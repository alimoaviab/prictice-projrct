# Eduplexo — full stack docker-compose.
#
# Brings up four services:
#   * postgres        — Postgres 16, persisted to a named volume
#   * migrate         — golang-migrate runner that applies migrations once
#                       and then exits successfully
#   * backend-go      — Go HTTP API on :8080
#   * frontend        — Vite-built React SPA served by nginx on :3000
#
# After `docker compose up --build`:
#   * Frontend at  http://localhost:3000
#   * Backend at   http://localhost:8080
#   * Postgres on  127.0.0.1:5432  (user/pass: school_user/school_password)
#
# Bring everything down with `docker compose down -v` to also drop the
# Postgres volume.

services:
  postgres:
    image: postgres:16-alpine
    container_name: school_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: school_db
      POSTGRES_USER: school_user
      POSTGRES_PASSWORD: school_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_user -d school_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: school_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-go/migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://school_user:school_password@postgres:5432/school_db?sslmode=disable",
        "up",
      ]
    restart: "no"

  backend-go:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: school_backend
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      APP_NAME: school
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001,http://frontend:80,http://super-admin:80"
      COOKIE_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-me}
      DATABASE_URL: postgres://school_user:school_password@postgres:5432/school_db?sslmode=disable
    ports:
      - "8080:8080"
    # Distroless image has no shell or curl, so we rely on depends_on
    # ordering instead of a Docker healthcheck. The frontend container
    # waits via depends_on; the host reaches /health on :8080 directly.

  frontend:
    build:
      context: ./school-react-app
      dockerfile: Dockerfile
    container_name: school_frontend
    restart: unless-stopped
    depends_on:
      - backend-go
    ports:
      - "3000:80"

  super-admin:
    build:
      context: ./super-admin-app
      dockerfile: Dockerfile
    container_name: school_super_admin
    restart: unless-stopped
    depends_on:
      - backend-go
    ports:
      - "3001:80"

volumes:
  postgres_data:
    name: eduplexo_postgres_data
