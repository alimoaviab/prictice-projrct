# Serves the Vite-built SPA from /usr/share/nginx/html and proxies every
# /api/* request to the Go backend container. The frontend never reaches
# any other origin in production.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: every non-asset path serves index.html so React Router
    # can pick up the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # The Vite output already fingerprints assets — long-cache them.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Shared JSON payloads (syllabus/question type catalogs).
    # Do not fallback to index.html here; return 404 for missing files.
    location /data/ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # API proxy. The "backend-go" hostname resolves inside the docker-compose
    # network. Pass through cookies and the Authorization / x-academic-year-id
    # headers untouched.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend http://backend-go:8080;
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_read_timeout 60s;
    }

    # Plexa chatbot proxy. Routes /chat/* to the Python FastAPI service.
    # Buffering is disabled so SSE streaming works in real time.
    location /chat/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_edubot http://edubot:8001;
        proxy_pass         $upstream_edubot;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_pass_request_headers on;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }
}
