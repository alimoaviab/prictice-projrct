<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <link rel="apple-touch-icon" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7TGNKT4RS7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7TGNKT4RS7');
    </script>
    <title>Eduplexo — School Workspace</title>
    <meta name="description" content="Multi-school SaaS school workspace" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" /></noscript>
    <style>
      /* 
       * CRITICAL: Hide material icon text until font loads.
       * Uses !important to ensure no Tailwind/CSS override can show the text.
       * The text "dashboard", "edit" etc must NEVER be visible to users.
       */
      .material-symbols-outlined {
        color: transparent !important;
        overflow: hidden !important;
        display: inline-block !important;
        width: 1em !important;
        height: 1em !important;
        line-height: 1 !important;
        vertical-align: middle;
      }
      html.material-icons-loaded .material-symbols-outlined {
        color: inherit !important;
      }
    </style>
    <script>
      // Detect Material Symbols font load and reveal icons
      (function() {
        function reveal() {
          document.documentElement.classList.add('material-icons-loaded');
        }
        if (document.fonts && document.fonts.load) {
          document.fonts.load('20px "Material Symbols Outlined"').then(reveal).catch(reveal);
          document.fonts.ready.then(reveal);
        }
        // Ultimate fallback
        setTimeout(reveal, 5000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
