# Serves the Vite-built SPA from /usr/share/nginx/html and proxies every
# /api/* request to the Go backend container.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: every non-asset path serves index.html so React Router
    # can pick up the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The Vite output already fingerprints assets — long-cache them.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy. The "backend-go" hostname resolves inside the docker-compose
    # network.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend http://backend-go:8080;
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_read_timeout 60s;
    }
}
