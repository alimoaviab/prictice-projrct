# Serves the Vite-built landing site from /usr/share/nginx/html.
# No API proxy needed — the landing is a pure marketing surface.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback so client routing keeps working on direct hits.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The Vite output already fingerprints assets — long-cache them.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
