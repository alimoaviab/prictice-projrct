# ═══════════════════════════════════════════════════════════════════════════
# Eduplexo Production Nginx Configuration
# ═══════════════════════════════════════════════════════════════════════════
#
# Features:
#   - HTTP/2 with TLS
#   - Gzip + Brotli compression
#   - Static asset caching (1 year, immutable)
#   - API reverse proxy with keepalive connections
#   - WebSocket upgrade support
#   - Rate limiting (100 req/min per IP on /api/)
#   - Upstream health checks
#   - Security headers

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ──────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 10m;
    server_tokens off;

    # ─── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/plain
        text/css
        text/xml
        text/javascript
        image/svg+xml
        application/x-javascript;

    # ─── Brotli Compression (requires ngx_brotli module) ──────────────────
    # Uncomment if brotli module is installed:
    # brotli on;
    # brotli_comp_level 4;
    # brotli_min_length 1024;
    # brotli_types
    #     application/json
    #     application/javascript
    #     text/plain
    #     text/css
    #     text/xml
    #     image/svg+xml;

    # ─── Rate Limiting ────────────────────────────────────────────────────
    # 100 requests per minute per IP for API routes
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # Stricter limit for auth endpoints (prevent brute force)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ─── Upstream: Go Backend ─────────────────────────────────────────────
    upstream backend {
        server backend-go-1:8080;
        server backend-go-2:8080;

        # Keepalive connections to backend (reuse TCP connections)
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # ─── Proxy Cache ──────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api_cache:10m
        max_size=100m
        inactive=5m
        use_temp_path=off;

    # ─── HTTPS Server (School App — port 443) ─────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name app.eduplexo.com *.eduplexo.com;

        # ─── TLS Configuration ────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ─── Security Headers ─────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ─── Static Assets (Vite build output) ────────────────────────────
        # Vite uses content-hashed filenames — safe to cache forever.
        location /assets/ {
            alias /usr/share/nginx/html/school/assets/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff";
            access_log off;
        }

        # ─── Favicon & manifest ───────────────────────────────────────────
        location ~* \.(ico|png|webmanifest)$ {
            root /usr/share/nginx/html/school;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            access_log off;
        }

        # ─── API Proxy ────────────────────────────────────────────────────
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Don't buffer responses (stream them)
            proxy_buffering off;
        }

        # ─── Auth endpoints (stricter rate limit) ─────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── WebSocket Support ────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket timeout (keep connection alive)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ─── Health check (internal only) ─────────────────────────────────
        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ─── Metrics (restrict to internal network) ───────────────────────
        location /metrics {
            # Only allow from internal Docker network or monitoring
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ─── SPA Fallback (React Router) ──────────────────────────────────
        location / {
            root /usr/share/nginx/html/school;
            try_files $uri $uri/ /index.html;

            # HTML should not be cached (contains hashed asset references)
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
        }
    }

    # ─── HTTP → HTTPS Redirect ────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
}
